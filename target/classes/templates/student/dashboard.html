<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student Dashboard - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">
    <nav class="navbar navbar-expand-lg navbar-dark nav-custom">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> SMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" href="/student/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    <a class="nav-link" href="/student/profile"><i class="fas fa-user-circle"></i> Profile</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link nav-link text-decoration-none"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row">
            <div class="col-lg-8">
                <div class="page-card shadow-lg">
                    <div class="page-card-header">
                        <h2><i class="fas fa-user-graduate"></i> Welcome Back</h2>
                        <p class="subtitle">Here's your student information and dashboard overview.</p>
                    </div>
                    <div class="page-card-body">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <p><strong><i class="fas fa-id-badge text-primary"></i> Name:</strong></p>
                                <p class="ms-4" th:text="${user.fullName}"></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong><i class="fas fa-barcode text-primary"></i> Student ID:</strong></p>
                                <p class="ms-4" th:text="${student.studentId}"></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong><i class="fas fa-book text-primary"></i> Course:</strong></p>
                                <p class="ms-4" th:text="${student.course}"></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong><i class="fas fa-building text-primary"></i> Department:</strong></p>
                                <p class="ms-4" th:text="${student.department}"></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong><i class="fas fa-calendar-alt text-primary"></i> Year:</strong></p>
                                <p class="ms-4" th:text="${student.year}"></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong><i class="fas fa-envelope text-primary"></i> Email:</strong></p>
                                <p class="ms-4" th:text="${user.email}"></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong><i class="fas fa-phone text-primary"></i> Phone:</strong></p>
                                <p class="ms-4" th:text="${student.phone}"></p>
                            </div>
                            <div class="col-md-6">
                                <p><strong><i class="fas fa-map-marker-alt text-primary"></i> Address:</strong></p>
                                <p class="ms-4" th:text="${student.address}"></p>
                            </div>
                        </div>
                        <div class="mt-4">
                            <a href="/student/profile" class="btn btn-primary btn-lg"><i class="fas fa-edit"></i> Update Profile</a>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="page-card shadow-lg h-100">
                    <div class="page-card-header">
                        <h3><i class="fas fa-chart-bar"></i> Quick Stats</h3>
                    </div>
                    <div class="page-card-body">
                        <div class="mb-4">
                            <p class="text-muted mb-1">Account Status</p>
                            <span class="badge bg-success fs-6"><i class="fas fa-check-circle"></i> Active</span>
                        </div>
                        <div class="mb-4">
                            <p class="text-muted mb-1">Last Login</p>
                            <p>Today</p>
                        </div>
                        <div class="mb-4">
                            <p class="text-muted mb-1">Member Since</p>
                            <p>2024</p>
                        </div>
                        <hr />
                        <a href="/student/profile" class="btn btn-outline-primary w-100 btn-sm"><i class="fas fa-cogs"></i> Account Settings</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
