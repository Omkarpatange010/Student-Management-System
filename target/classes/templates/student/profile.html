<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Profile - Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">
    <nav class="navbar navbar-expand-lg navbar-dark nav-custom">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> SMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/student/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    <a class="nav-link active" href="/student/profile"><i class="fas fa-user-circle"></i> Profile</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link nav-link text-decoration-none"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="page-card shadow-lg">
            <div class="page-card-header">
                <h2><i class="fas fa-user-edit"></i> Update Profile</h2>
                <p class="subtitle">Update your profile information and personal details.</p>
            </div>
            <div class="page-card-body">
                <form th:action="@{/student/update-profile}" method="post" class="dashboard-form">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="fullName" class="form-label"><i class="fas fa-user"></i> Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                <input type="text" class="form-control form-input" id="fullName" name="fullName" th:value="${user.fullName}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="email" class="form-label"><i class="fas fa-envelope"></i> Email</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-at"></i></span>
                                <input type="email" class="form-control form-input" id="email" name="email" th:value="${user.email}" required>
                            </div>
                        </div>

                        <div class="col-md-6">
                            <label for="phone" class="form-label"><i class="fas fa-phone"></i> Phone</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                <input type="tel" class="form-control form-input" id="phone" name="phone" th:value="${student.phone}" required>
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label for="studentId" class="form-label"><i class="fas fa-barcode"></i> Student ID</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="fas fa-id-badge"></i></span>
                                <input type="text" class="form-control form-input" id="studentId" name="studentId" th:value="${student.studentId}" disabled>
                            </div>
                        </div>

                        <div class="col-12">
                            <label for="address" class="form-label"><i class="fas fa-map-marker-alt"></i> Address</label>
                            <textarea class="form-control form-input" id="address" name="address" rows="4" required th:text="${student.address}"></textarea>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2">
                        <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save"></i> Update Profile</button>
                        <a href="/student/dashboard" class="btn btn-outline-secondary btn-lg"><i class="fas fa-arrow-left"></i> Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
