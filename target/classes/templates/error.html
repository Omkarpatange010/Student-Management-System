<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .error-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .error-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            padding: 3rem 2rem;
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        .display-4 {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .lead {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
        }

        .alert-danger {
            background: linear-gradient(135deg, #f44336, #d32f2f);
            color: white;
            border: none;
            border-radius: 10px;
        }

        .btn {
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            margin: 0.25rem;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        @media (max-width: 768px) {
            .error-container {
                padding: 1rem;
            }

            .error-card {
                padding: 2rem 1.5rem;
                border-radius: 15px;
            }

            .display-4 {
                font-size: 2.5rem;
            }

            .lead {
                font-size: 1.1rem;
            }

            .alert {
                font-size: 0.95rem;
                padding: 1rem;
            }

            .btn-lg {
                padding: 0.75rem 1.5rem;
                font-size: 1rem;
                width: calc(50% - 0.5rem);
                margin: 0.25rem;
            }

            .d-flex {
                flex-wrap: wrap;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            .error-container {
                padding: 0.5rem;
            }

            .error-card {
                padding: 1.5rem 1rem;
            }

            .display-4 {
                font-size: 2rem;
            }

            .lead {
                font-size: 1rem;
            }

            .alert {
                font-size: 0.9rem;
                padding: 0.75rem;
            }

            .btn-lg {
                width: 100%;
                margin: 0.25rem 0;
                padding: 0.7rem 1rem;
                font-size: 0.95rem;
            }

            .text-muted {
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="login-body">
    <div class="error-container">
        <div class="error-card">
            <h1 class="display-4"><i class="fas fa-exclamation-circle" style="color: #dc3545;"></i> Oops!</h1>
            <p class="lead">An error occurred while navigating the application.</p>
            <div class="alert alert-danger mt-3" role="alert">
                <strong><i class="fas fa-bug"></i> Status Code:</strong> <span th:text="${status}">404</span> <br/>
                <strong><i class="fas fa-exclamation-triangle"></i> Error:</strong> <span th:text="${message}">Not Found</span> <br/>
                <strong><i class="fas fa-link"></i> URL:</strong> <code th:text="${path}">/error</code>
            </div>
            <p class="text-muted mt-3">Please contact the administrator if the problem persists.</p>
            <div class="mt-4 d-flex gap-2 justify-content-center flex-wrap">
                <a href="/" class="btn btn-primary btn-lg"><i class="fas fa-home"></i> Go to Home</a>
                <a href="/login" class="btn btn-success btn-lg"><i class="fas fa-sign-in-alt"></i> Go to Login</a>
                <button onclick="goBack()" class="btn btn-secondary btn-lg"><i class="fas fa-arrow-left"></i> Go Back</button>
                <button onclick="window.location.reload()" class="btn btn-warning btn-lg"><i class="fas fa-refresh"></i> Reload Page</button>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function goBack() {
            try {
                // Check if we can go back
                if (window.history.length > 1 && document.referrer !== window.location.href) {
                    window.history.back();
                } else {
                    // If no history or same page, go to home page
                    window.location.href = '/';
                }
            } catch (e) {
                // Fallback: go to home page
                window.location.href = '/';
            }
        }

        // Add keyboard shortcuts for better navigation
        document.addEventListener('keydown', function(e) {
            // Escape key to go home
            if (e.key === 'Escape') {
                window.location.href = '/';
            }
            // F5 or Ctrl+R to reload (already handled by browser)
        });
    </script>
</body>
</html>
