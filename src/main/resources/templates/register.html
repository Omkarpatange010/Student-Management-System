<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media (max-width: 768px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 1.5rem;
            }

            .card-header {
                padding: 1.5rem 1rem;
            }

            .card-title {
                font-size: 1.8rem;
            }

            .card-subtitle {
                font-size: 0.9rem;
            }

            .card-body {
                padding: 1.5rem 1rem;
            }

            .row > [class*='col-'] {
                margin-bottom: 1rem;
            }

            .btn-login {
                width: 100%;
                padding: 0.75rem 1rem;
                font-size: 1rem;
            }

            .register-link {
                font-size: 0.9rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 0.5rem;
            }

            .login-card {
                padding: 1rem;
            }

            .card-header {
                padding: 1rem 0.75rem;
            }

            .card-title {
                font-size: 1.5rem;
            }

            .card-body {
                padding: 1rem 0.75rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-label {
                font-size: 0.9rem;
            }

            .form-input {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .btn-login {
                padding: 0.7rem 0.9rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="card-header text-center">
                <i class="fas fa-user-plus fa-3x mb-3 text-primary"></i>
                <h3 class="card-title">Join Us</h3>
                <p class="card-subtitle">Create Your Account</p>
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs" id="registerTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="student-tab" data-bs-toggle="tab" data-bs-target="#student" type="button" role="tab" aria-controls="student" aria-selected="true">Student Registration</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="faculty-tab" data-bs-toggle="tab" data-bs-target="#faculty" type="button" role="tab" aria-controls="faculty" aria-selected="false">Faculty Registration</button>
                    </li>
                </ul>
                <div class="tab-content" id="registerTabsContent">
                    <div class="tab-pane fade show active" id="student" role="tabpanel" aria-labelledby="student-tab">
                        <form th:action="@{/register}" method="post" class="login-form mt-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="role" value="STUDENT">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-username" class="form-label">
                                            <i class="fas fa-user"></i> Username
                                        </label>
                                        <input type="text" class="form-control form-input" id="student-username" name="username" required placeholder="Choose username">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-password" class="form-label">
                                            <i class="fas fa-lock"></i> Password
                                        </label>
                                        <input type="password" class="form-control form-input" id="student-password" name="password" required placeholder="Create password">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-email" class="form-label">
                                            <i class="fas fa-envelope"></i> Email
                                        </label>
                                        <input type="email" class="form-control form-input" id="student-email" name="email" required placeholder="your@email.com">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-fullName" class="form-label">
                                            <i class="fas fa-id-card"></i> Full Name
                                        </label>
                                        <input type="text" class="form-control form-input" id="student-fullName" name="fullName" required placeholder="Full name">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-course" class="form-label">
                                            <i class="fas fa-book"></i> Course
                                        </label>
                                        <input type="text" class="form-control form-input" id="student-course" name="course" required placeholder="Course name">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-department" class="form-label">
                                            <i class="fas fa-building"></i> Department
                                        </label>
                                        <input type="text" class="form-control form-input" id="student-department" name="department" required placeholder="Department">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-studentId" class="form-label">
                                            <i class="fas fa-id-badge"></i> Student ID
                                        </label>
                                        <input type="text" class="form-control form-input" id="student-studentId" name="studentId" required placeholder="Student ID">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-year" class="form-label">
                                            <i class="fas fa-calendar"></i> Year
                                        </label>
                                        <input type="number" class="form-control form-input" id="student-year" name="year" placeholder="Year (optional)">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-phone" class="form-label">
                                            <i class="fas fa-phone"></i> Phone
                                        </label>
                                        <input type="text" class="form-control form-input" id="student-phone" name="phone" required placeholder="Phone number">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="student-address" class="form-label">
                                            <i class="fas fa-map-marker-alt"></i> Address
                                        </label>
                                        <textarea class="form-control form-input" id="student-address" name="address" rows="1" placeholder="Address"></textarea>
                                    </div>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-login w-100">
                                <i class="fas fa-user-plus"></i> Register as Student
                            </button>
                        </form>
                    </div>
                    <div class="tab-pane fade" id="faculty" role="tabpanel" aria-labelledby="faculty-tab">
                        <form th:action="@{/register}" method="post" class="login-form mt-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <input type="hidden" name="role" value="FACULTY">
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="faculty-username" class="form-label">
                                            <i class="fas fa-user-tie"></i> Username
                                        </label>
                                        <input type="text" class="form-control form-input" id="faculty-username" name="username" required placeholder="Choose username">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="faculty-password" class="form-label">
                                            <i class="fas fa-lock"></i> Password
                                        </label>
                                        <input type="password" class="form-control form-input" id="faculty-password" name="password" required placeholder="Create password">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="faculty-email" class="form-label">
                                            <i class="fas fa-envelope"></i> Email
                                        </label>
                                        <input type="email" class="form-control form-input" id="faculty-email" name="email" required placeholder="your@email.com">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="faculty-fullName" class="form-label">
                                            <i class="fas fa-id-card"></i> Full Name
                                        </label>
                                        <input type="text" class="form-control form-input" id="faculty-fullName" name="fullName" required placeholder="Full name">
                                    </div>
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="faculty-phone" class="form-label">
                                            <i class="fas fa-phone"></i> Phone
                                        </label>
                                        <input type="text" class="form-control form-input" id="faculty-phone" name="phone" required placeholder="Phone number">
                                    </div>
                                </div>
                                <div class="col-md-6">
                                    <div class="form-group mb-3">
                                        <label for="faculty-department" class="form-label">
                                            <i class="fas fa-building"></i> Department
                                        </label>
                                        <input type="text" class="form-control form-input" id="faculty-department" name="department" required placeholder="Department">
                                    </div>
                                </div>
                            </div>
                            <div class="alert alert-info" role="alert">
                                <i class="fas fa-info-circle"></i> <strong>Note:</strong> Your registration request will be reviewed by an Admin. You will receive approval notification once verified.
                            </div>
                            <button type="submit" class="btn btn-login w-100">
                                <i class="fas fa-user-plus"></i> Register as Faculty
                            </button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="/login" class="register-link">
                        <i class="fas fa-sign-in-alt"></i> Already have an account? Login
                    </a>
                </div>
                <div th:if="${error}" class="alert alert-danger mt-3 animate__animated animate__shake">
                    <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
