<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subjects - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent-color: #00d4ff; }
        body { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); color: #ecf0f1; }
        .dashboard-body { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); }
        .dashboard-sidebar { background: linear-gradient(180deg, #0f172a 0%, #0f3460 100%); border-right: 3px solid var(--accent-color); }
        .sidebar-brand { color: var(--accent-color); font-weight: 700; letter-spacing: 1px; }
        .sidebar-link { color: #bdc3c7; transition: all 0.3s ease; border-radius: 8px; }
        .sidebar-link:hover, .sidebar-link.active { color: var(--accent-color); background-color: rgba(0, 212, 255, 0.15); }
        .dashboard-content { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); }
        .dashboard-header { background: transparent; }
        .dashboard-header h1 { color: var(--accent-color); font-weight: 700; text-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .page-card { background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(26, 26, 46, 0.8) 100%); border: 2px solid var(--accent-color); border-radius: 15px; }
        .page-card-header { border-bottom: 2px solid var(--accent-color); }
        .page-card-header h3 { color: var(--accent-color); font-weight: 700; }
        .subtitle { color: #bdc3c7; }
        .table-custom thead th { background: rgba(0, 212, 255, 0.1); color: var(--accent-color); border-color: var(--accent-color); }
        .table-custom tbody tr { background: rgba(0, 212, 255, 0.05); border-color: var(--accent-color); color: #ecf0f1; }
        .table-custom tbody tr:hover { background: rgba(0, 212, 255, 0.15); }
        .btn-success { background: linear-gradient(135deg, var(--accent-color), #00a8cc); border: none; color: #000; font-weight: 600; }
        .btn-success:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 212, 255, 0.3); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-color), #00a8cc); border: none; color: #000; }
        .form-label { color: #ecf0f1; }
        .form-control { background: rgba(0, 212, 255, 0.05); border: 2px solid var(--accent-color); color: #ecf0f1; }
        .form-control:focus { background: rgba(0, 212, 255, 0.1); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        .input-group-text { background: rgba(0, 212, 255, 0.1); border: 2px solid var(--accent-color); color: var(--accent-color); }

        @media (max-width: 768px) {
            .dashboard-layout {
                flex-direction: column;
            }

            .dashboard-sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 3px solid var(--accent-color);
            }

            .sidebar-nav {
                flex-direction: row;
                overflow-x: auto;
                padding: 0.5rem;
            }

            .sidebar-nav li {
                margin-right: 1rem;
            }

            .dashboard-content {
                width: 100%;
            }

            .page-card {
                margin: 1rem;
            }

            .table-responsive {
                font-size: 0.9rem;
            }

            .form-control {
                font-size: 0.95rem;
            }

            .btn-success, .btn-primary {
                width: 100%;
                margin-bottom: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .dashboard-sidebar {
                padding: 1rem;
            }

            .sidebar-brand {
                font-size: 1.2rem;
            }

            .sidebar-nav {
                padding: 0.25rem;
            }

            .sidebar-nav li {
                margin-right: 0.5rem;
            }

            .page-card {
                margin: 0.5rem;
                padding: 1rem;
            }

            .page-card-header h2 {
                font-size: 1.5rem;
            }

            .table-responsive {
                font-size: 0.8rem;
            }

            .form-label {
                font-size: 0.9rem;
            }

            .form-control {
                font-size: 0.9rem;
                padding: 0.5rem;
            }

            .btn-success, .btn-primary {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-brand"><i class="fas fa-star"></i> Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a class="sidebar-link" href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a class="sidebar-link" href="/admin/students"><i class="fas fa-users"></i> Students</a></li>
                <li><a class="sidebar-link active" href="/admin/subjects"><i class="fas fa-book"></i> Subjects</a></li>
                <li><a class="sidebar-link" href="/admin/attendance"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                <li><a class="sidebar-link" href="/admin/marks"><i class="fas fa-chart-line"></i> Marks</a></li>
                <li><a class="sidebar-link" href="/admin/change-password"><i class="fas fa-lock"></i> Change Password</a></li>
                <li><hr class="sidebar-divider my-3"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link sidebar-link text-decoration-none p-0"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1><i class="fas fa-book"></i> Subjects Management</h1>
            </header>

            <div class="actions-group mt-4">
                <a href="/admin/add-subject" class="btn btn-success btn-lg"><i class="fas fa-plus"></i> Add Subject</a>
                <form th:action="@{/admin/update-fees}" method="post" class="d-inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <button type="submit" class="btn btn-warning btn-lg"><i class="fas fa-rupee-sign"></i> Update Fees to 350 RS</button>
                </form>
            </div>

            <div class="table-responsive mt-4">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Course Title</th>
                            <th>Course Code</th>
                            <th>CP</th>
                            <th>EXT</th>
                            <th>INT</th>
                            <th>Semester</th>
                            <th>Type</th>
                            <th>Fee (RS)</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="subject : ${subjects}">
                            <td th:text="${subject.courseTitle}"></td>
                            <td th:text="${subject.courseCode}"></td>
                            <td th:text="${subject.cp}"></td>
                            <td th:text="${subject.ext}"></td>
                            <td th:text="${subject.internal}"></td>
                            <td th:text="${subject.semester}"></td>
                            <td th:text="${subject.type}"></td>
                            <td><span class="badge bg-success">₹<span th:text="${subject.fee}"></span></span></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
