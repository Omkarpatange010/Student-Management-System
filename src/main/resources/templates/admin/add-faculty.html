<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Faculty - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent-color: #00d4ff;
            --dark-bg: #1a1a2e;
            --darker-bg: #0f3460;
        }

        body {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            color: #ecf0f1;
        }

        .dashboard-body {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
            color: #ecf0f1;
        }

        .dashboard-sidebar {
            background: linear-gradient(180deg, #0f172a 0%, #0f3460 100%);
            border-right: 3px solid var(--accent-color);
        }

        .sidebar-brand {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: 1px;
        }

        .sidebar-link {
            color: #bdc3c7;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .sidebar-link:hover,
        .sidebar-link.active {
            color: var(--accent-color);
            background-color: rgba(0, 212, 255, 0.15);
            padding-left: 1rem;
        }

        .dashboard-content {
            background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%);
        }

        .dashboard-header {
            background: transparent;
            margin-bottom: 2rem;
        }

        .dashboard-header h1 {
            color: var(--accent-color);
            font-weight: 700;
            font-size: 2.5rem;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.2);
        }

        .welcome-note {
            color: #bdc3c7;
            font-size: 1.1rem;
        }

        .page-card {
            background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(26, 26, 46, 0.8) 100%);
            border: 2px solid var(--accent-color);
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1);
        }

        .page-card:hover {
            box-shadow: 0 12px 48px rgba(0, 212, 255, 0.2);
            transform: translateY(-5px);
        }

        .page-card-header {
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .page-card-header h2,
        .page-card-header h3 {
            color: var(--accent-color);
            font-weight: 700;
        }

        .subtitle {
            color: #bdc3c7;
        }

        .form-label {
            color: #ecf0f1;
            font-weight: 600;
        }

        .form-control, .form-input, .form-select {
            background: rgba(0, 212, 255, 0.05);
            border: 2px solid var(--accent-color);
            color: #ecf0f1;
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-input:focus, .form-select:focus {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.3);
            color: #ecf0f1;
        }

        .input-group-text {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
        }

        .btn-success {
            background: linear-gradient(135deg, var(--accent-color), #00a8cc);
            border: none;
            color: #000;
            border-radius: 8px;
            font-weight: 600;
            transition: all 0.3s ease;
            padding: 0.75rem 1.5rem;
        }

        .btn-success:hover {
            background: linear-gradient(135deg, #00a8cc, var(--accent-color));
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.3);
            color: #000;
        }

        .btn-secondary {
            background: rgba(0, 212, 255, 0.1);
            border: 2px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: 8px;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.2);
            color: var(--accent-color);
        }

        .alert {
            background: rgba(255, 193, 7, 0.1);
            border: 1px solid #ffc107;
            color: #ffc107;
            border-radius: 8px;
        }

        @media (max-width: 992px) {
            .dashboard-sidebar {
                width: 100%;
            }

            .dashboard-header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-brand"><i class="fas fa-star"></i> Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a class="sidebar-link" href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a class="sidebar-link" href="/admin/pending-registrations"><i class="fas fa-user-clock"></i> Pending Registrations</a></li>
                <li><a class="sidebar-link" href="/admin/exam-registrations"><i class="fas fa-clipboard-check"></i> Exam Registrations</a></li>
                <li><a class="sidebar-link" href="/admin/students"><i class="fas fa-users"></i> Students</a></li>
                <li><a class="sidebar-link active" href="/admin/faculty"><i class="fas fa-chalkboard-teacher"></i> Faculty</a></li>
                <li><a class="sidebar-link" href="/admin/subjects"><i class="fas fa-book"></i> Subjects</a></li>
                <li><a class="sidebar-link" href="/admin/attendance"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                <li><a class="sidebar-link" href="/admin/marks"><i class="fas fa-chart-line"></i> Marks</a></li>
                <li><a class="sidebar-link" href="/admin/change-password"><i class="fas fa-lock"></i> Change Password</a></li>
                <li><hr class="sidebar-divider my-3"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link sidebar-link text-decoration-none p-0"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1><i class="fas fa-user-plus"></i> Add Faculty</h1>
                <p class="welcome-note">Create a new faculty account</p>
            </header>

            <div class="page-card p-4">
                <div class="page-card-header mb-3">
                    <h2>Faculty Information</h2>
                    <p class="subtitle">Enter faculty details to create account</p>
                </div>
                <div class="page-card-body">
                    <div th:if="${error}" class="alert alert-danger" role="alert">
                        <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
                    </div>
                    <form th:action="@{/admin/add-faculty}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">Username</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-user"></i></span>
                                    <input type="text" class="form-control" id="username" name="username" required placeholder="Choose username">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-lock"></i></span>
                                    <input type="password" class="form-control" id="password" name="password" required placeholder="Create password">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-envelope"></i></span>
                                    <input type="email" class="form-control" id="email" name="email" required placeholder="faculty@email.com">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="fullName" class="form-label">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-id-card"></i></span>
                                    <input type="text" class="form-control" id="fullName" name="fullName" required placeholder="Full name">
                                </div>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="department" class="form-label">Department</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-building"></i></span>
                                    <input type="text" class="form-control" id="department" name="department" required placeholder="Department">
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="phone" class="form-label">Phone</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="fas fa-phone"></i></span>
                                    <input type="text" class="form-control" id="phone" name="phone" required placeholder="Phone number">
                                </div>
                            </div>
                        </div>
                        <div class="mt-4">
                            <button type="submit" class="btn btn-success"><i class="fas fa-save"></i> Create Faculty Account</button>
                            <a href="/admin/faculty" class="btn btn-secondary"><i class="fas fa-arrow-left"></i> Back to Faculty List</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
