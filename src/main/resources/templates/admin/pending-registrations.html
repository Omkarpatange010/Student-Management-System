<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pending Registrations - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-brand"><i class="fas fa-star"></i> Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a class="sidebar-link" href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a class="sidebar-link active" href="/admin/pending-registrations"><i class="fas fa-user-clock"></i> Pending Registrations</a></li>
                <li><a class="sidebar-link" href="/admin/students"><i class="fas fa-users"></i> Students</a></li>
                <li><a class="sidebar-link" href="/admin/subjects"><i class="fas fa-book"></i> Subjects</a></li>
                <li><a class="sidebar-link" href="/admin/attendance"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                <li><a class="sidebar-link" href="/admin/marks"><i class="fas fa-chart-line"></i> Marks</a></li>
                <li><a class="sidebar-link" href="/admin/change-password"><i class="fas fa-lock"></i> Change Password</a></li>
                <li><hr class="sidebar-divider my-3"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link sidebar-link text-decoration-none p-0"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1><i class="fas fa-user-clock"></i> Pending Registrations</h1>
            </header>

            <div class="table-responsive mt-4">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Course</th>
                            <th>Department</th>
                            <th>Year</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="data : ${pendingData}">
                            <td th:text="${data.user.fullName}"></td>
                            <td th:text="${data.user.email}"></td>
                            <td th:text="${data.student != null ? data.student.course : 'N/A'}"></td>
                            <td th:text="${data.student != null ? data.student.department : 'N/A'}"></td>
                            <td th:text="${data.student != null ? data.student.year : 'N/A'}"></td>
                            <td>
                                <form th:action="@{/admin/approve-registration}" method="post" style="display:inline;">
                                    <input type="hidden" name="userId" th:value="${data.user.id}" />
                                    <button type="submit" class="btn btn-success btn-sm">
                                        <i class="fas fa-check"></i> Approve
                                    </button>
                                </form>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
