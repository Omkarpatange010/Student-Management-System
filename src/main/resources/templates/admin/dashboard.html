<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-brand"><i class="fas fa-star"></i> Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a class="sidebar-link active" href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a class="sidebar-link" href="/admin/students"><i class="fas fa-users"></i> Students</a></li>
                <li><a class="sidebar-link" href="/admin/change-password"><i class="fas fa-lock"></i> Change Password</a></li>
                <li><hr class="sidebar-divider my-3"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link sidebar-link text-decoration-none p-0"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1><i class="fas fa-chart-line"></i> Admin Dashboard</h1>
            </header>

            <div class="dashboard-cards">
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon bg-blue"><i class="fas fa-user-graduate"></i></div>
                        <h5 class="card-title">Total Students</h5>
                        <p class="stat-value" th:text="${#lists.size(students)}">0</p>
                    </div>
                </div>
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon bg-green"><i class="fas fa-user-check"></i></div>
                        <h5 class="card-title">Active Users</h5>
                        <p class="stat-value" th:text="${#lists.size(students)}">0</p>
                    </div>
                </div>
                <div class="card stat-card">
                    <div class="card-body">
                        <div class="stat-icon bg-purple"><i class="fas fa-calendar-alt"></i></div>
                        <h5 class="card-title">Weekly Logins</h5>
                        <p class="stat-value">12</p>
                    </div>
                </div>
            </div>

            <div class="actions-group mt-5">
                <a href="/admin/add-student" class="btn btn-success btn-lg"><i class="fas fa-user-plus"></i> Add Student</a>
                <a href="/admin/students" class="btn btn-secondary btn-lg"><i class="fas fa-list"></i> Manage Students</a>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
