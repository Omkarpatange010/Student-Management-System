<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Marks - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent-color: #00d4ff; }
        body { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); color: #ecf0f1; }
        .dashboard-body { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); }
        .dashboard-sidebar { background: linear-gradient(180deg, #0f172a 0%, #0f3460 100%); border-right: 3px solid var(--accent-color); }
        .sidebar-brand { color: var(--accent-color); font-weight: 700; }
        .sidebar-link { color: #bdc3c7; transition: all 0.3s ease; }
        .sidebar-link:hover, .sidebar-link.active { color: var(--accent-color); background-color: rgba(0, 212, 255, 0.15); }
        .dashboard-content { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); }
        .dashboard-header h1 { color: var(--accent-color); font-weight: 700; text-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .page-card { background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(26, 26, 46, 0.8) 100%); border: 2px solid var(--accent-color); border-radius: 15px; }
        .page-card-header { border-bottom: 2px solid var(--accent-color); }
        .page-card-header h2 { color: var(--accent-color); font-weight: 700; }
        .subtitle { color: #bdc3c7; }
        .table-custom thead th { background: rgba(0, 212, 255, 0.1); color: var(--accent-color); border-color: var(--accent-color); }
        .table-custom tbody tr { background: rgba(0, 212, 255, 0.05); border-color: var(--accent-color); color: #ecf0f1; }
        .table-custom tbody tr:hover { background: rgba(0, 212, 255, 0.15); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-color), #00a8cc); border: none; color: #000; }
        .form-label { color: #ecf0f1; }
        .form-control, .form-select { background: rgba(0, 212, 255, 0.05); border: 2px solid var(--accent-color); color: #ecf0f1; }
        .form-control:focus, .form-select:focus { background: rgba(0, 212, 255, 0.1); box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
        .input-group-text { background: rgba(0, 212, 255, 0.1); border: 2px solid var(--accent-color); color: var(--accent-color); }

        @media (max-width: 768px) {
            .dashboard-layout {
                flex-direction: column;
            }

            .dashboard-sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 3px solid var(--accent-color);
            }

            .sidebar-nav {
                flex-direction: row;
                overflow-x: auto;
                padding: 0.5rem;
            }

            .sidebar-nav li {
                margin-right: 1rem;
            }

            .dashboard-content {
                width: 100%;
            }

            .page-card {
                margin: 1rem;
            }

            .table-responsive {
                font-size: 0.9rem;
            }

            .form-control, .form-select {
                font-size: 0.95rem;
            }

            .btn-primary {
                width: 100%;
                margin-bottom: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .dashboard-sidebar {
                padding: 1rem;
            }

            .sidebar-brand {
                font-size: 1.2rem;
            }

            .sidebar-nav {
                padding: 0.25rem;
            }

            .sidebar-nav li {
                margin-right: 0.5rem;
            }

            .page-card {
                margin: 0.5rem;
                padding: 1rem;
            }

            .page-card-header h2 {
                font-size: 1.5rem;
            }

            .table-responsive {
                font-size: 0.8rem;
            }

            .form-label {
                font-size: 0.9rem;
            }

            .form-control, .form-select {
                font-size: 0.9rem;
                padding: 0.5rem;
            }

            .btn-primary {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-brand"><i class="fas fa-star"></i> Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a class="sidebar-link" href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a class="sidebar-link" href="/admin/students"><i class="fas fa-users"></i> Students</a></li>
                <li><a class="sidebar-link" href="/admin/subjects"><i class="fas fa-book"></i> Subjects</a></li>
                <li><a class="sidebar-link" href="/admin/attendance"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                <li><a class="sidebar-link active" href="/admin/marks"><i class="fas fa-chart-line"></i> Marks</a></li>
                <li><a class="sidebar-link" href="/admin/change-password"><i class="fas fa-lock"></i> Change Password</a></li>
                <li><hr class="sidebar-divider my-3"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link sidebar-link text-decoration-none p-0"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1><i class="fas fa-chart-line"></i> Marks Management</h1>
                <div th:if="${filterStudent}" class="alert alert-info mt-3">
                    <strong>Filtering by Student:</strong> <span th:text="${filterStudent.studentId} + ' - ' + ${filterStudentName}"></span>
                    <a href="/admin/marks" class="btn btn-sm btn-outline-secondary ms-2">Clear Filter</a>
                </div>
            </header>

            <div class="card mt-4">
                <div class="card-body">
                    <h5>Add Marks</h5>
                    <form th:action="@{/admin/add-marks}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="row">
                            <div class="col-md-3 mb-3">
                                <label for="studentId" class="form-label">Student</label>
                                <select class="form-control" id="studentId" name="studentId" required>
                                    <option th:each="data : ${studentData}" th:value="${data.student.id}" th:text="${data.student.studentId} + ' - ' + ${data.name}"></option>
                                </select>
                            </div>
                            <div class="col-md-3 mb-3">
                                <label for="subjectId" class="form-label">Subject</label>
                                <select class="form-control" id="subjectId" name="subjectId" required>
                                    <option th:each="subject : ${subjects}" th:value="${subject.id}" th:text="${subject.courseCode} + ' - ' + ${subject.courseTitle}"></option>
                                </select>
                            </div>
                            <div class="col-md-2 mb-3">
                                <label for="externalMarks" class="form-label">External Marks</label>
                                <input type="number" class="form-control" id="externalMarks" name="externalMarks" required min="0" max="50">
                            </div>
                            <div class="col-md-2 mb-3">
                                <label for="internalMarks" class="form-label">Internal Marks</label>
                                <input type="number" class="form-control" id="internalMarks" name="internalMarks" required min="0" max="25">
                            </div>
                            <div class="col-md-2 mb-3">
                                <label for="semester" class="form-label">Semester</label>
                                <select class="form-control" id="semester" name="semester" required>
                                    <option value="MCA Semester I">MCA Semester I</option>
                                    <option value="MCA Semester II">MCA Semester II</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary">Add Marks</button>
                    </form>
                </div>
            </div>

            <div class="table-responsive mt-4">
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Student ID</th>
                            <th>Name</th>
                            <th>Subject</th>
                            <th>External</th>
                            <th>Internal</th>
                            <th>Total</th>
                            <th>Semester</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="data : ${marksData}">
                            <td th:text="${data.studentId}"></td>
                            <td th:text="${data.name}"></td>
                            <td th:text="${data.subjectTitle}"></td>
                            <td th:text="${data.marks.externalMarks}"></td>
                            <td th:text="${data.marks.internalMarks}"></td>
                            <td th:text="${data.marks.externalMarks + data.marks.internalMarks}"></td>
                            <td th:text="${data.marks.semester}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
