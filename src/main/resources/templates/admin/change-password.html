<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password - Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent-color: #00d4ff; }
        body { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); color: #ecf0f1; }
        .dashboard-body { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); }
        .dashboard-sidebar { background: linear-gradient(180deg, #0f172a 0%, #0f3460 100%); border-right: 3px solid var(--accent-color); }
        .sidebar-brand { color: var(--accent-color); font-weight: 700; }
        .sidebar-link { color: #bdc3c7; transition: all 0.3s ease; }
        .sidebar-link:hover, .sidebar-link.active { color: var(--accent-color); background-color: rgba(0, 212, 255, 0.15); }
        .dashboard-content { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); }
        .dashboard-header h1 { color: var(--accent-color); font-weight: 700; text-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .page-card { background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(26, 26, 46, 0.8) 100%); border: 2px solid var(--accent-color); border-radius: 15px; }
        .page-card-header { border-bottom: 2px solid var(--accent-color); }
        .page-card-header h2 { color: var(--accent-color); font-weight: 700; }
        .subtitle { color: #bdc3c7; }
        .form-label { color: #ecf0f1; font-weight: 600; }
        .form-control { background: rgba(0, 212, 255, 0.05); border: 2px solid var(--accent-color); color: #ecf0f1; border-radius: 8px; }
        .form-control:focus { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); color: #ecf0f1; }
        .input-group-text { background: rgba(0, 212, 255, 0.1); border: 2px solid var(--accent-color); color: var(--accent-color); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-color), #00a8cc); border: none; color: #000; font-weight: 600; border-radius: 8px; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 212, 255, 0.3); }
        .btn-secondary { background: rgba(0, 212, 255, 0.1); border: 2px solid var(--accent-color); color: var(--accent-color); }

        @media (max-width: 768px) {
            .dashboard-layout {
                flex-direction: column;
            }

            .dashboard-sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 3px solid var(--accent-color);
            }

            .sidebar-nav {
                flex-direction: row;
                overflow-x: auto;
                padding: 0.5rem;
            }

            .sidebar-nav li {
                margin-right: 1rem;
            }

            .dashboard-content {
                width: 100%;
            }

            .page-card {
                margin: 1rem;
            }

            .form-control {
                font-size: 0.95rem;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
                margin-bottom: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .dashboard-sidebar {
                padding: 1rem;
            }

            .sidebar-brand {
                font-size: 1.2rem;
            }

            .sidebar-nav {
                padding: 0.25rem;
            }

            .sidebar-nav li {
                margin-right: 0.5rem;
            }

            .page-card {
                margin: 0.5rem;
                padding: 1rem;
            }

            .page-card-header h2 {
                font-size: 1.5rem;
            }

            .form-label {
                font-size: 0.9rem;
            }

            .form-control {
                font-size: 0.9rem;
                padding: 0.5rem;
            }

            .btn-primary, .btn-secondary {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-brand"><i class="fas fa-star"></i> Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a class="sidebar-link" href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a class="sidebar-link" href="/admin/students"><i class="fas fa-users"></i> Students</a></li>
                <li><a class="sidebar-link" href="/admin/subjects"><i class="fas fa-book"></i> Subjects</a></li>
                <li><a class="sidebar-link" href="/admin/attendance"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                <li><a class="sidebar-link" href="/admin/marks"><i class="fas fa-chart-line"></i> Marks</a></li>
                <li><a class="sidebar-link active" href="/admin/change-password"><i class="fas fa-lock"></i> Change Password</a></li>
                <li><hr class="sidebar-divider my-3"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link sidebar-link text-decoration-none p-0"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1><i class="fas fa-lock"></i> Change Password</h1>
            </header>

            <div class="row justify-content-center">
                <div class="col-lg-6">
                    <div class="page-card shadow-lg">
                        <div class="page-card-header">
                            <h3><i class="fas fa-key"></i> Update Your Password</h3>
                            <p class="subtitle">Enter your current password and choose a new secure password</p>
                        </div>
                        <div class="page-card-body">
                            <!-- Success Message -->
                            <div th:if="${success}" class="alert alert-success alert-dismissible fade show" role="alert">
                                <i class="fas fa-check-circle"></i> <span th:text="${success}"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>

                            <!-- Error Message -->
                            <div th:if="${error}" class="alert alert-danger alert-dismissible fade show" role="alert">
                                <i class="fas fa-exclamation-triangle"></i> <span th:text="${error}"></span>
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>

                            <form th:action="@{/admin/change-password}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                                <div class="mb-3">
                                    <label for="oldPassword" class="form-label">
                                        <i class="fas fa-lock text-muted"></i> Current Password
                                    </label>
                                    <input type="password" class="form-input" id="oldPassword" name="oldPassword"
                                           placeholder="Enter your current password" required>
                                </div>

                                <div class="mb-3">
                                    <label for="newPassword" class="form-label">
                                        <i class="fas fa-key text-muted"></i> New Password
                                    </label>
                                    <input type="password" class="form-input" id="newPassword" name="newPassword"
                                           placeholder="Enter your new password" required>
                                    <div class="form-text">
                                        Password must be at least 6 characters long
                                    </div>
                                </div>

                                <div class="mb-3">
                                    <label for="confirmPassword" class="form-label">
                                        <i class="fas fa-key text-muted"></i> Confirm New Password
                                    </label>
                                    <input type="password" class="form-input" id="confirmPassword" name="confirmPassword"
                                           placeholder="Confirm your new password" required>
                                </div>

                                <div class="d-grid">
                                    <button type="submit" class="btn btn-action">
                                        <i class="fas fa-save"></i> Update Password
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Password confirmation validation
        document.querySelector('form').addEventListener('submit', function(e) {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (newPassword !== confirmPassword) {
                e.preventDefault();
                alert('New password and confirmation password do not match!');
                return false;
            }

            if (newPassword.length < 6) {
                e.preventDefault();
                alert('New password must be at least 6 characters long!');
                return false;
            }
        });
    </script>
</body>
</html>
