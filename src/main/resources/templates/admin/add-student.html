<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Student - Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --accent-color: #00d4ff; }
        body { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); color: #ecf0f1; }
        .dashboard-body { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); }
        .dashboard-sidebar { background: linear-gradient(180deg, #0f172a 0%, #0f3460 100%); border-right: 3px solid var(--accent-color); }
        .sidebar-brand { color: var(--accent-color); font-weight: 700; letter-spacing: 1px; }
        .sidebar-link { color: #bdc3c7; transition: all 0.3s ease; border-radius: 8px; }
        .sidebar-link:hover, .sidebar-link.active { color: var(--accent-color); background-color: rgba(0, 212, 255, 0.15); }
        .dashboard-content { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); }
        .dashboard-header { background: transparent; }
        .dashboard-header h1 { color: var(--accent-color); font-weight: 700; text-shadow: 0 0 20px rgba(0, 212, 255, 0.2); }
        .page-card { background: linear-gradient(135deg, rgba(15, 52, 96, 0.8) 0%, rgba(26, 26, 46, 0.8) 100%); border: 2px solid var(--accent-color); border-radius: 15px; box-shadow: 0 8px 32px rgba(0, 212, 255, 0.1); }
        .page-card:hover { box-shadow: 0 12px 48px rgba(0, 212, 255, 0.2); transform: translateY(-5px); }
        .page-card-header { border-bottom: 2px solid var(--accent-color); }
        .page-card-header h2 { color: var(--accent-color); font-weight: 700; }
        .subtitle { color: #bdc3c7; }
        .form-label { color: #ecf0f1; font-weight: 600; }
        .form-control { background: rgba(0, 212, 255, 0.05); border: 2px solid var(--accent-color); color: #ecf0f1; border-radius: 8px; }
        .form-control:focus { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); color: #ecf0f1; }
        .input-group-text { background: rgba(0, 212, 255, 0.1); border: 2px solid var(--accent-color); color: var(--accent-color); }
        .btn-primary { background: linear-gradient(135deg, var(--accent-color), #00a8cc); border: none; color: #000; font-weight: 600; border-radius: 8px; }
        .btn-primary:hover { background: linear-gradient(135deg, #00a8cc, var(--accent-color)); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0, 212, 255, 0.3); }
        .btn-secondary { background: rgba(0, 212, 255, 0.1); border: 2px solid var(--accent-color); color: var(--accent-color); }

        @media (max-width: 768px) {
            .dashboard-layout {
                flex-direction: column;
            }

            .dashboard-sidebar {
                width: 100%;
                height: auto;
                border-right: none;
                border-bottom: 3px solid var(--accent-color);
            }

            .sidebar-nav {
                flex-direction: row;
                overflow-x: auto;
                padding: 0.5rem;
            }

            .sidebar-nav li {
                margin-right: 1rem;
            }

            .dashboard-content {
                width: 100%;
            }

            .page-card {
                margin: 1rem;
            }

            .form-control {
                font-size: 0.95rem;
            }

            .btn-primary, .btn-secondary {
                width: 100%;
                margin-bottom: 0.5rem;
            }
        }

        @media (max-width: 480px) {
            .dashboard-sidebar {
                padding: 1rem;
            }

            .sidebar-brand {
                font-size: 1.2rem;
            }

            .sidebar-nav {
                padding: 0.25rem;
            }

            .sidebar-nav li {
                margin-right: 0.5rem;
            }

            .page-card {
                margin: 0.5rem;
                padding: 1rem;
            }

            .page-card-header h2 {
                font-size: 1.5rem;
            }

            .form-label {
                font-size: 0.9rem;
            }

            .form-control {
                font-size: 0.9rem;
                padding: 0.5rem;
            }

            .btn-primary, .btn-secondary {
                padding: 0.6rem 1rem;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body class="dashboard-body">
    <div class="dashboard-layout">
        <aside class="dashboard-sidebar">
            <div class="sidebar-brand"><i class="fas fa-star"></i> Admin Panel</div>
            <ul class="sidebar-nav">
                <li><a class="sidebar-link" href="/admin/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                <li><a class="sidebar-link active" href="/admin/students"><i class="fas fa-users"></i> Students</a></li>
                <li><a class="sidebar-link" href="/admin/change-password"><i class="fas fa-lock"></i> Change Password</a></li>
                <li><hr class="sidebar-divider my-3"></li>
                <li>
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link sidebar-link text-decoration-none p-0"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </li>
            </ul>
        </aside>

        <main class="dashboard-content">
            <header class="dashboard-header">
                <h1><i class="fas fa-user-plus"></i> Add New Student</h1>
            </header>

            <div class="container-fluid">
                <div class="page-card shadow-lg">
                    <div class="page-card-header">
                        <h2><i class="fas fa-form"></i> Student Registration Form</h2>
                        <p class="subtitle">Fill in all the required details to create a new student account.</p>
                    </div>
                    <div class="page-card-body">
                        <form th:action="@{/admin/add-student}" method="post" class="dashboard-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div th:if="${error}" class="alert alert-danger"> <i class="fas fa-exclamation-circle"></i> <span th:text="${error}"></span> </div>
                            <div class="row g-3">
                                <div class="col-md-6">
                                    <label for="username" class="form-label"><i class="fas fa-user"></i> Username</label>
                                    <input type="text" class="form-control form-input" id="username" name="username" placeholder="e.g., student123" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="password" class="form-label"><i class="fas fa-lock"></i> Password</label>
                                    <input type="password" class="form-control form-input" id="password" name="password" placeholder="Strong password" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="fullName" class="form-label"><i class="fas fa-id-card"></i> Full Name</label>
                                    <input type="text" class="form-control form-input" id="fullName" name="fullName" placeholder="e.g., John Doe" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="email" class="form-label"><i class="fas fa-envelope"></i> Email</label>
                                    <input type="email" class="form-control form-input" id="email" name="email" placeholder="student@example.com" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="studentId" class="form-label"><i class="fas fa-barcode"></i> Student ID</label>
                                    <input type="text" class="form-control form-input" id="studentId" name="studentId" placeholder="e.g., MC12345" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="course" class="form-label"><i class="fas fa-book"></i> Course</label>
                                    <input type="text" class="form-control form-input" id="course" name="course" placeholder="e.g., Computer Science" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="department" class="form-label"><i class="fas fa-building"></i> Department</label>
                                    <input type="text" class="form-control form-input" id="department" name="department" placeholder="e.g., Engineering" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="year" class="form-label"><i class="fas fa-calendar-alt"></i> Year</label>
                                    <input type="number" class="form-control form-input" id="year" name="year" min="1" max="5" placeholder="1-5" required>
                                </div>

                                <div class="col-md-6">
                                    <label for="phone" class="form-label"><i class="fas fa-phone"></i> Phone</label>
                                    <input type="tel" class="form-control form-input" id="phone" name="phone" placeholder="+91 XXXXX XXXXX" required>
                                </div>
                                <div class="col-md-6">
                                    <label for="address" class="form-label"><i class="fas fa-map-marker-alt"></i> Address</label>
                                    <input type="text" class="form-control form-input" id="address" name="address" placeholder="City, State" required>
                                </div>
                            </div>

                            <div class="d-flex justify-content-end gap-2 mt-4">
                                <a href="/admin/students" class="btn btn-outline-secondary btn-lg"><i class="fas fa-times"></i> Cancel</a>
                                <button type="submit" class="btn btn-success btn-lg"><i class="fas fa-plus-circle"></i> Add Student</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
