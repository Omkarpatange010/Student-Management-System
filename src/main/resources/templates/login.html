<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media (max-width: 768px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 1.5rem;
                max-width: 100%;
            }

            .card-header {
                padding: 1.5rem 1rem;
            }

            .card-title {
                font-size: 1.8rem;
            }

            .card-subtitle {
                font-size: 0.9rem;
            }

            .card-body {
                padding: 1.5rem 1rem;
            }

            .nav-tabs .nav-link {
                padding: 0.5rem 0.75rem;
                font-size: 0.9rem;
            }

            .form-group {
                margin-bottom: 1rem;
            }

            .form-label {
                font-size: 0.9rem;
            }

            .form-input {
                padding: 0.75rem;
                font-size: 0.9rem;
            }

            .btn-login {
                padding: 0.75rem 1rem;
                font-size: 1rem;
            }

            .register-link {
                font-size: 0.9rem;
            }

            .alert {
                font-size: 0.9rem;
                padding: 0.75rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 0.5rem;
            }

            .login-card {
                padding: 1rem;
            }

            .card-header {
                padding: 1rem 0.75rem;
            }

            .card-title {
                font-size: 1.5rem;
            }

            .card-subtitle {
                font-size: 0.85rem;
            }

            .card-body {
                padding: 1rem 0.75rem;
            }

            .nav-tabs .nav-link {
                padding: 0.4rem 0.6rem;
                font-size: 0.85rem;
            }

            .form-group {
                margin-bottom: 0.8rem;
            }

            .form-label {
                font-size: 0.85rem;
            }

            .form-input {
                padding: 0.7rem;
                font-size: 0.85rem;
            }

            .btn-login {
                padding: 0.7rem 0.9rem;
                font-size: 0.95rem;
            }

            .register-link {
                font-size: 0.85rem;
            }

            .alert {
                font-size: 0.85rem;
                padding: 0.6rem;
            }
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="card-header text-center">
                <i class="fas fa-graduation-cap fa-3x mb-3 text-primary"></i>
                <h3 class="card-title">Welcome Back</h3>
                <p class="card-subtitle">Dr Sudhakarrao Jadhavar Institute of Management and Technology</p>
            </div>
            <div class="card-body">
                <ul class="nav nav-tabs" id="loginTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="student-tab" data-bs-toggle="tab" data-bs-target="#student" type="button" role="tab" aria-controls="student" aria-selected="true">Student Login</button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="admin-tab" data-bs-toggle="tab" data-bs-target="#admin" type="button" role="tab" aria-controls="admin" aria-selected="false">Admin Login</button>
                    </li>
                </ul>
                <div class="tab-content" id="loginTabsContent">
                    <div class="tab-pane fade show active" id="student" role="tabpanel" aria-labelledby="student-tab">
                        <form th:action="@{/login}" method="post" class="login-form mt-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="form-group mb-4">
                                <label for="student-username" class="form-label">
                                    <i class="fas fa-user"></i> Username
                                </label>
                                <input type="text" class="form-control form-input" id="student-username" name="username" required placeholder="Enter your username">
                            </div>
                            <div class="form-group mb-4">
                                <label for="student-password" class="form-label">
                                    <i class="fas fa-lock"></i> Password
                                </label>
                                <input type="password" class="form-control form-input" id="student-password" name="password" required placeholder="Enter your password">
                            </div>
                            <button type="submit" class="btn btn-login w-100">
                                <i class="fas fa-sign-in-alt"></i> Student Login
                            </button>
                        </form>
                    </div>
                    <div class="tab-pane fade" id="admin" role="tabpanel" aria-labelledby="admin-tab">
                        <form th:action="@{/login}" method="post" class="login-form mt-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="form-group mb-4">
                                <label for="admin-username" class="form-label">
                                    <i class="fas fa-user-shield"></i> Admin Username
                                </label>
                                <input type="text" class="form-control form-input" id="admin-username" name="username" required placeholder="Enter admin username">
                            </div>
                            <div class="form-group mb-4">
                                <label for="admin-password" class="form-label">
                                    <i class="fas fa-lock"></i> Admin Password
                                </label>
                                <input type="password" class="form-control form-input" id="admin-password" name="password" required placeholder="Enter admin password">
                            </div>
                            <button type="submit" class="btn btn-login w-100">
                                <i class="fas fa-sign-in-alt"></i> Admin Login
                            </button>
                        </form>
                    </div>
                </div>
                <div class="text-center mt-4">
                    <a href="/register" class="register-link">
                        <i class="fas fa-user-plus"></i> Don't have an account? Register
                    </a>
                </div>
                <div th:if="${param.registered}" class="alert alert-success mt-3 animate__animated animate__fadeIn">
                    <i class="fas fa-check-circle"></i> Registration successful. Please login.
                </div>
                <div th:if="${param.pending}" class="alert alert-info mt-3 animate__animated animate__fadeIn">
                    <i class="fas fa-clock"></i> Registration submitted. Waiting for admin approval.
                </div>
                <div th:if="${param.error}" class="alert alert-danger mt-3 animate__animated animate__shake">
                    <i class="fas fa-exclamation-triangle"></i> Invalid username or password.
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
