<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="card-header text-center">
                <i class="fas fa-graduation-cap fa-3x mb-3 text-primary"></i>
                <h3 class="card-title">Welcome Back</h3>
                <p class="card-subtitle">Student Management System</p>
            </div>
            <div class="card-body">
                <form th:action="@{/login}" method="post" class="login-form">
                    <div class="form-group mb-4">
                        <label for="username" class="form-label">
                            <i class="fas fa-user"></i> Username
                        </label>
                        <input type="text" class="form-control form-input" id="username" name="username" required placeholder="Enter your username">
                    </div>
                    <div class="form-group mb-4">
                        <label for="password" class="form-label">
                            <i class="fas fa-lock"></i> Password
                        </label>
                        <input type="password" class="form-control form-input" id="password" name="password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn btn-login w-100">
                        <i class="fas fa-sign-in-alt"></i> Login
                    </button>
                </form>
                <div class="text-center mt-4">
                    <a href="/register" class="register-link">
                        <i class="fas fa-user-plus"></i> Don't have an account? Register
                    </a>
                </div>
                <div th:if="${param.logout}" class="alert alert-success mt-3 animate__animated animate__fadeIn">
                    <i class="fas fa-check-circle"></i> You have been logged out successfully.
                </div>
                <div th:if="${param.registered}" class="alert alert-success mt-3 animate__animated animate__fadeIn">
                    <i class="fas fa-check-circle"></i> Registration successful. Please login.
                </div>
                <div th:if="${param.error}" class="alert alert-danger mt-3 animate__animated animate__shake">
                    <i class="fas fa-exclamation-triangle"></i> Invalid username or password.
                </div>
            </div>
        </div>
    </div>
</body>
</html>
