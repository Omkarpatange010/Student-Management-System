<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Marks - Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">
    <nav class="navbar navbar-expand-lg navbar-dark nav-custom">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> SMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/student/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    <a class="nav-link" href="/student/profile"><i class="fas fa-user-circle"></i> Profile</a>
                    <a class="nav-link" href="/student/attendance"><i class="fas fa-calendar-check"></i> Attendance</a>
                    <a class="nav-link active" href="/student/marks"><i class="fas fa-chart-line"></i> Marks</a>
                    <a class="nav-link" href="/student/subjects"><i class="fas fa-book"></i> Subjects</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link nav-link text-decoration-none"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="page-card shadow-lg">
            <div class="page-card-header">
                <h2><i class="fas fa-chart-line"></i> My Marks</h2>
                <p class="subtitle">View your marks for different subjects.</p>
            </div>
            <div class="page-card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Subject</th>
                                <th>External Marks</th>
                                <th>Internal Marks</th>
                                <th>Total</th>
                                <th>Semester</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="mark : ${marks}">
                                <td th:text="${subjects.stream().filter(s -> s.id.equals(mark.subjectId)).findFirst().orElse(new com.example.studentmanagement.model.Subject()).courseTitle}"></td>
                                <td th:text="${mark.externalMarks}"></td>
                                <td th:text="${mark.internalMarks}"></td>
                                <td th:text="${mark.externalMarks + mark.internalMarks}"></td>
                                <td th:text="${mark.semester}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
