<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Subjects - Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="dashboard-body">
    <nav class="navbar navbar-expand-lg navbar-dark nav-custom">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> SMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/student/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    <a class="nav-link" href="/student/profile"><i class="fas fa-user-circle"></i> Profile</a>
                    <a class="nav-link" href="/student/attendance"><i class="fas fa-calendar-check"></i> Attendance</a>
                    <a class="nav-link" href="/student/marks"><i class="fas fa-chart-line"></i> Marks</a>
                    <a class="nav-link active" href="/student/subjects"><i class="fas fa-book"></i> Subjects</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link nav-link text-decoration-none"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="page-card shadow-lg">
            <div class="page-card-header">
                <h2><i class="fas fa-book"></i> Subjects</h2>
                <p class="subtitle">View and add subjects.</p>
            </div>
            <div class="page-card-body">
                <div class="mb-4">
                    <button class="btn btn-primary" data-bs-toggle="collapse" data-bs-target="#addSubjectForm">Add Subject</button>
                </div>
                <div class="collapse" id="addSubjectForm">
                    <div class="card card-body">
                        <form th:action="@{/student/add-subject}" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="courseTitle" class="form-label">Course Title</label>
                                    <input type="text" class="form-control" id="courseTitle" name="courseTitle" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="courseCode" class="form-label">Course Code</label>
                                    <input type="text" class="form-control" id="courseCode" name="courseCode" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="cp" class="form-label">CP</label>
                                    <input type="number" class="form-control" id="cp" name="cp" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="ext" class="form-label">EXT</label>
                                    <input type="number" class="form-control" id="ext" name="ext" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="internal" class="form-label">INT</label>
                                    <input type="number" class="form-control" id="internal" name="internal" required>
                                </div>
                                <div class="col-md-3 mb-3">
                                    <label for="semester" class="form-label">Semester</label>
                                    <select class="form-control" id="semester" name="semester" required>
                                        <option value="MCA Semester I">MCA Semester I</option>
                                        <option value="MCA Semester II">MCA Semester II</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="type" class="form-label">Type</label>
                                    <select class="form-control" id="type" name="type" required>
                                        <option value="Theory">Theory</option>
                                        <option value="Practical">Practical</option>
                                        <option value="Elective">Elective</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="fee" class="form-label">Fee (RS)</label>
                                    <input type="number" class="form-control" id="fee" name="fee" value="350" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-success">Add Subject</button>
                        </form>
                    </div>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Course Title</th>
                                <th>Course Code</th>
                                <th>CP</th>
                                <th>EXT</th>
                                <th>INT</th>
                                <th>Semester</th>
                                <th>Type</th>
                                <th>Fee (RS)</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="subject : ${subjects}">
                                <td th:text="${subject.courseTitle}"></td>
                                <td th:text="${subject.courseCode}"></td>
                                <td th:text="${subject.cp}"></td>
                                <td th:text="${subject.ext}"></td>
                                <td th:text="${subject.internal}"></td>
                                <td th:text="${subject.semester}"></td>
                                <td th:text="${subject.type}"></td>
                                <td><span class="badge bg-success">₹<span th:text="${subject.fee}"></span></span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
