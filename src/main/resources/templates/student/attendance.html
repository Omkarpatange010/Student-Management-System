<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Attendance - Student Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --accent-color: #00d4ff;
            --surface-color: rgba(15, 34, 77, 0.92);
            --surface-border: rgba(0, 212, 255, 0.15);
            --text-light: #f4f7fb;
            --text-muted: #a9b6cf;
        }

        body.dashboard-body {
            background: linear-gradient(135deg, #0f172a 0%, #0f3460 58%, #1a1a2e 100%);
            color: var(--text-light);
            min-height: 100vh;
        }

        .nav-custom {
            background: rgba(7, 18, 43, 0.95);
            border-bottom: 1px solid rgba(0, 212, 255, 0.12);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
        }

        .navbar-brand {
            color: #ffffff;
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        .nav-link {
            color: #d8e2f0;
            transition: color 0.25s ease;
        }

        .nav-link:hover,
        .nav-link.active {
            color: var(--accent-color);
        }

        .page-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 24px;
            padding: 1.8rem;
            overflow: hidden;
        }

        .page-card-header h2 {
            color: #ffffff;
            font-size: 2rem;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            color: var(--text-muted);
            margin-bottom: 1.3rem;
        }

        .table-responsive {
            overflow-x: auto;
        }

        .table {
            min-width: 400px;
        }

        .table thead th {
            color: var(--accent-color);
            border-bottom: 1px solid rgba(0, 212, 255, 0.18);
            white-space: nowrap;
        }

        .table tbody tr {
            background: rgba(255, 255, 255, 0.04);
        }

        .table tbody tr:hover {
            background: rgba(0, 212, 255, 0.08);
        }

        .badge {
            letter-spacing: 0.02em;
            padding: 0.55em 0.85em;
        }

        @media (max-width: 991.98px) {
            .navbar-brand {
                font-size: 1.05rem;
            }

            .page-card {
                padding: 1.4rem;
            }

            .page-card-header h2 {
                font-size: 1.75rem;
            }

            .table {
                min-width: 100%;
            }
        }

        @media (max-width: 767.98px) {
            .container {
                padding-left: 0.75rem;
                padding-right: 0.75rem;
            }

            .page-card {
                padding: 1.2rem;
                border-radius: 20px;
            }

            .page-card-header h2 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.95rem;
            }

            .table-responsive {
                margin-top: 1rem;
            }

            .table thead th,
            .table tbody td {
                padding: 0.65rem 0.75rem;
                font-size: 0.92rem;
            }
        }

        @media (max-width: 575.98px) {
            .navbar .container {
                padding-left: 0.5rem;
                padding-right: 0.5rem;
            }

            .page-card {
                padding: 1rem;
            }

            .page-card-header {
                margin-bottom: 0.8rem;
            }

            .table thead th,
            .table tbody td {
                padding: 0.55rem 0.65rem;
                font-size: 0.88rem;
            }
        }
    </style>
</head>
<body class="dashboard-body">
    <nav class="navbar navbar-expand-lg navbar-dark nav-custom">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> SMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/student/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    <a class="nav-link" href="/student/profile"><i class="fas fa-user-circle"></i> Profile</a>
                    <a class="nav-link active" href="/student/attendance"><i class="fas fa-calendar-check"></i> Attendance</a>
                    <a class="nav-link" href="/student/marks"><i class="fas fa-chart-line"></i> Marks</a>
                    <a class="nav-link" href="/student/subjects"><i class="fas fa-book"></i> Subjects</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link nav-link text-decoration-none"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="page-card shadow-lg">
            <div class="page-card-header">
                <h2><i class="fas fa-calendar-check"></i> My Attendance</h2>
                <p class="subtitle">View your attendance records.</p>
            </div>
            <div class="page-card-body">
                <div class="table-responsive">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="attendance : ${attendances}">
                                <td th:text="${#dates.format(attendance.date, 'yyyy-MM-dd')}"></td>
                                <td th:text="${attendance.status}"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
