<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Student ID Card - Dr. Sudhakarrao Jadhavar Institute</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .id-card {
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.15);
            border: 2px solid #e2e8f0;
            max-width: 400px;
            margin: 0 auto;
            overflow: hidden;
            position: relative;
        }

        .id-card-header {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
            color: white;
            padding: 15px;
            text-align: center;
            position: relative;
        }

        .id-card-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><defs><pattern id="grain" width="100" height="100" patternUnits="userSpaceOnUse"><circle cx="25" cy="25" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="75" cy="75" r="1" fill="rgba(255,255,255,0.1)"/><circle cx="50" cy="10" r="0.5" fill="rgba(255,255,255,0.1)"/></pattern></defs><rect width="100" height="100" fill="url(%23grain)"/></svg>');
            opacity: 0.3;
        }

        .id-card-header h3 {
            margin: 0;
            font-size: 1.2rem;
            font-weight: 700;
            position: relative;
            z-index: 1;
        }

        .id-card-header p {
            margin: 5px 0 0 0;
            font-size: 0.9rem;
            opacity: 0.9;
            position: relative;
            z-index: 1;
        }

        .id-card-body {
            padding: 20px;
            display: flex;
            gap: 15px;
        }

        .photo-section {
            flex-shrink: 0;
        }

        .passport-photo {
            width: 100px;
            height: 120px;
            border-radius: 10px;
            border: 3px solid #e2e8f0;
            object-fit: cover;
            background: #f1f5f9;
            display: block;
        }

        .info-section {
            flex: 1;
        }

        .info-item {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .info-label {
            font-weight: 600;
            color: #374151;
            font-size: 0.85rem;
            min-width: 70px;
        }

        .info-value {
            color: #1f2937;
            font-size: 0.9rem;
            flex: 1;
        }

        .id-card-footer {
            background: #f8fafc;
            padding: 10px 20px;
            border-top: 1px solid #e2e8f0;
            text-align: center;
        }

        .student-id-display {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            display: inline-block;
            margin-bottom: 5px;
        }

        .validity {
            font-size: 0.8rem;
            color: #6b7280;
        }

        .print-btn {
            background: linear-gradient(135deg, #10b981, #059669);
            border: none;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-weight: 600;
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        .print-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
        }

        @media print {
            body * {
                visibility: hidden;
            }
            .id-card, .id-card * {
                visibility: visible;
            }
            .id-card {
                position: absolute;
                left: 0;
                top: 0;
                box-shadow: none;
                border: 1px solid #000;
            }
            .print-btn {
                display: none;
            }
        }
    </style>
</head>
<body class="dashboard-body">
    <nav class="navbar navbar-expand-lg navbar-dark nav-custom">
        <div class="container">
            <a class="navbar-brand" href="#"><i class="fas fa-graduation-cap"></i> SMS</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/student/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a>
                    <a class="nav-link" href="/student/profile"><i class="fas fa-user-circle"></i> Profile</a>
                    <a class="nav-link" href="/student/attendance"><i class="fas fa-calendar-check"></i> Attendance</a>
                    <a class="nav-link" href="/student/marks"><i class="fas fa-chart-line"></i> Marks</a>
                    <a class="nav-link" href="/student/subjects"><i class="fas fa-book"></i> Subjects</a>
                    <a class="nav-link active" href="/student/id-card"><i class="fas fa-id-card"></i> ID Card</a>
                    <form th:action="@{/logout}" method="post" class="d-inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="btn btn-link nav-link text-decoration-none"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </form>
                </div>
            </div>
        </div>
    </nav>

    <div class="container mt-5 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="text-center mb-4">
                    <h2><i class="fas fa-id-card text-info"></i> Student Identity Card</h2>
                    <p class="text-muted">Dr. Sudhakarrao Jadhavar Institute of Management and Technology</p>
                </div>

                <div class="id-card">
                    <div class="id-card-header">
                        <h3><i class="fas fa-university"></i> DSJIMT</h3>
                        <p>Student Identity Card</p>
                    </div>

                    <div class="id-card-body">
                        <div class="photo-section">
                            <img src="/img/logo1.webp" alt="ID Profile Photo" class="passport-photo" />
                        </div>

                        <div class="info-section">
                            <div class="info-item">
                                <span class="info-label">Name:</span>
                                <span class="info-value" th:text="${user.fullName}"></span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">User ID:</span>
                                <span class="info-value" th:text="${user.username}"></span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Student ID:</span>
                                <span class="info-value" th:text="${student.studentId}"></span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Email:</span>
                                <span class="info-value" th:text="${user.email}"></span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Phone:</span>
                                <span class="info-value" th:text="${student.phone}"></span>
                            </div>
                            <div class="info-item">
                                <span class="info-label">Address:</span>
                                <span class="info-value" th:text="${student.address}" style="font-size: 0.8rem;"></span>
                            </div>
                        </div>
                    </div>

                    <div class="id-card-footer">
                        <div class="student-id-display" th:text="'ID: ' + ${student.studentId}"></div>
                        <div class="validity">Valid for Academic Year 2024-2025</div>
                    </div>
                </div>

                <div class="text-center">
                    <button onclick="window.print()" class="btn print-btn">
                        <i class="fas fa-print"></i> Print ID Card
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
