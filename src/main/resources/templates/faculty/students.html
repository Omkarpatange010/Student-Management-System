<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management - Faculty</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #0f3460 0%, #1a1a2e 100%); color: #ecf0f1; }
        .dashboard-card { background: rgba(15, 52, 96, 0.9); border: 2px solid #00d4ff; border-radius: 15px; padding: 2rem; }
        .sidebar-link { color: #ecf0f1; text-decoration: none; display: block; padding: 0.75rem; border-radius: 5px; transition: background 0.3s; }
        .sidebar-link:hover, .sidebar-link.active { background: rgba(0, 212, 255, 0.2); color: #00d4ff; }
        .dashboard-sidebar { background: linear-gradient(180deg, #0f172a 0%, #0f3460 100%); min-height: 100vh; }
        .sidebar-nav li { margin-bottom: 0.75rem; }
        .sidebar-brand { color: #00d4ff; font-weight: 700; font-size: 1.5rem; }
        .table { background: rgba(0, 212, 255, 0.05); color: #ecf0f1; }
        .table th { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; }
        .table td { border-color: rgba(0, 212, 255, 0.2); }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #00a8cc); border: none; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0, 212, 255, 0.35); }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <nav class="col-md-2 dashboard-sidebar p-3">
                <div class="sidebar-brand mb-4">
                    <i class="fas fa-chalkboard-teacher"></i> Faculty Panel
                </div>
                <ul class="sidebar-nav list-unstyled">
                    <li><a class="sidebar-link" href="/faculty/dashboard"><i class="fas fa-tachometer-alt"></i> Dashboard</a></li>
                    <li><a class="sidebar-link active" href="/faculty/students"><i class="fas fa-users"></i> Student Management</a></li>
                    <li><a class="sidebar-link" href="/faculty/attendance"><i class="fas fa-calendar-check"></i> Attendance</a></li>
                    <li><a class="sidebar-link" href="/faculty/marks"><i class="fas fa-chart-line"></i> Marks</a></li>
                    <li><a class="sidebar-link" href="/faculty/id-card"><i class="fas fa-id-card"></i> ID Card</a></li>
                    <li><a class="sidebar-link" href="/faculty/reports"><i class="fas fa-chart-bar"></i> Performance</a></li>
                    <li><hr class="sidebar-divider my-3"></li>
                    <li>
                        <form th:action="@{/logout}" method="post" class="m-0">
                            <button type="submit" class="sidebar-link w-100 text-start border-0 bg-transparent">
                                <i class="fas fa-sign-out-alt"></i> Logout
                            </button>
                        </form>
                    </li>
                </ul>
            </nav>
            <main class="col-md-10 p-4">
                <div class="dashboard-card">
                    <h1><i class="fas fa-users"></i> Student Management</h1>
                    <p class="text-muted">View, add, and update student information.</p>
                    <a href="/faculty/add-student" class="btn btn-primary mb-3"><i class="fas fa-user-plus"></i> Add New Student</a>
                    <div class="table-responsive">
                        <table class="table table-striped">
                            <thead>
                                <tr>
                                    <th>Student ID</th>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Course</th>
                                    <th>Department</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="student : ${students}">
                                    <td th:text="${student.studentId}"></td>
                                    <td th:text="${student.user != null ? student.user.fullName : 'Unknown Student'}"></td>
                                    <td th:text="${student.user != null ? student.user.email : 'Unknown Email'}"></td>
                                    <td th:text="${student.course}"></td>
                                    <td th:text="${student.department}"></td>
                                    <td>
                                        <a th:href="@{/faculty/edit-student/{id}(id=${student.id})}" class="btn btn-sm btn-warning"><i class="fas fa-edit"></i> Edit</a>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </main>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
