<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Pending Approval - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @media (max-width: 768px) {
            .login-container {
                padding: 1rem;
            }

            .login-card {
                padding: 1.5rem;
            }

            .card-header {
                padding: 1.5rem 1rem;
            }

            .card-title {
                font-size: 1.8rem;
            }

            .card-subtitle {
                font-size: 0.9rem;
            }

            .card-body {
                padding: 1.5rem 1rem;
            }

            .alert {
                font-size: 0.95rem;
                padding: 1rem;
            }

            .btn {
                width: 100%;
                padding: 0.75rem 1rem;
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 0.5rem;
            }

            .login-card {
                padding: 1rem;
            }

            .card-header {
                padding: 1rem 0.75rem;
            }

            .card-title {
                font-size: 1.5rem;
            }

            .card-body {
                padding: 1rem 0.75rem;
            }

            .alert {
                font-size: 0.9rem;
                padding: 0.75rem;
            }

            .btn {
                padding: 0.7rem 0.9rem;
                font-size: 0.95rem;
            }
        }
    </style>
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="card-header text-center">
                <i class="fas fa-clock fa-3x mb-3 text-warning"></i>
                <h3 class="card-title">Approval Pending</h3>
                <p class="card-subtitle">Dr Sudhakarrao Jadhavar Institute of Management and Technology</p>
            </div>
            <div class="card-body">
                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i> Your registration request has been submitted and is pending admin approval. You will receive your student ID, username, and password once approved.
                </div>
                <div class="text-center mt-4">
                    <a href="/login" class="btn btn-primary">
                        <i class="fas fa-arrow-left"></i> Back to Login
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
