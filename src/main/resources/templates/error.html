<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Error - Student Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="login-body">
    <div class="error-container">
        <div class="error-card">
            <h1 class="display-4"><i class="fas fa-exclamation-circle" style="color: #dc3545;"></i> Oops!</h1>
            <p class="lead">An error occurred while navigating the application.</p>
            <div class="alert alert-danger mt-3" role="alert">
                <strong><i class="fas fa-bug"></i> Status Code:</strong> <span th:text="${status}">404</span> <br/>
                <strong><i class="fas fa-exclamation-triangle"></i> Error:</strong> <span th:text="${message}">Not Found</span> <br/>
                <strong><i class="fas fa-link"></i> URL:</strong> <code th:text="${path}">/error</code>
            </div>
            <p class="text-muted mt-3">Please contact the administrator if the problem persists.</p>
            <div class="mt-4 d-flex gap-2 justify-content-center">
                <a href="/login" class="btn btn-primary btn-lg"><i class="fas fa-sign-in-alt"></i> Go to Login</a>
                <a href="javascript:history.back()" class="btn btn-secondary btn-lg"><i class="fas fa-arrow-left"></i> Go Back</a>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
